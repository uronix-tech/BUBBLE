<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BubbleAR</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --border: rgba(255,255,255,0.08);
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --text: #f0f4f8;
    --muted: rgba(240,244,248,0.5);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
    top: -200px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.8rem;
    letter-spacing: -2px;
    margin-bottom: 0.3rem;
    position: relative;
    z-index: 1;
  }

  .logo span { color: var(--accent); }

  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    margin-bottom: 3rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 340px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.broadcaster::before {
    background: radial-gradient(circle at 30% 50%, rgba(0,229,255,0.08), transparent 70%);
  }

  .card.scanner::before {
    background: radial-gradient(circle at 30% 50%, rgba(124,77,255,0.08), transparent 70%);
  }

  .card:hover { transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }
  .card.broadcaster:hover { border-color: rgba(0,229,255,0.4); }
  .card.scanner:hover { border-color: rgba(124,77,255,0.4); }

  .card-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.5rem;
  }

  .broadcaster .card-icon { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); }
  .scanner .card-icon { background: rgba(124,77,255,0.1); border: 1px solid rgba(124,77,255,0.2); }

  .card-text h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }

  .card-text p {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .card-arrow {
    margin-right: auto;
    color: var(--muted);
    font-size: 1.2rem;
    transition: transform 0.2s;
  }
  .card:hover .card-arrow { transform: translateX(-4px); }

  .note {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.25);
    text-align: center;
    position: relative;
    z-index: 1;
    line-height: 1.6;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00e5a0;
    margin-left: 6px;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>

<div class="logo">Bubble<span>AR</span></div>
<p class="tagline">הזהות הדיגיטלית שלך — בעולם הפיזי</p>

<div class="cards">
  <a href="broadcaster.html" class="card broadcaster">
    <div class="card-icon">📡</div>
    <div class="card-text">
      <h2>שדר את הבועה שלי</h2>
      <p>הגדר פרופיל ופתח את הבועה שלך לעולם</p>
    </div>
    <div class="card-arrow">←</div>
  </a>

  <a href="scanner.html" class="card scanner">
    <div class="card-icon">📷</div>
    <div class="card-text">
      <h2>סרוק את הסביבה</h2>
      <p>גלה מי נמצא סביבך וראה את הבועות שלהם</p>
    </div>
    <div class="card-arrow">←</div>
  </a>
</div>

<p class="note">
  <span class="dot"></span>
  דורש Chrome על Android עם Bluetooth מופעל<br>
  Web Bluetooth API · WebRTC Camera · AR Overlay
</p>
</body>
</html>
