<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BubbleAR — שדר</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #080c10; --surface: #0f1419; --surface2: #151b22; --border: rgba(255,255,255,0.08); --accent: #00e5ff; --text: #f0f4f8; --muted: rgba(240,244,248,0.5); --danger: #ff4d6d; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .header { display: flex; align-items: center; gap: 1rem; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(8,12,16,0.9); backdrop-filter: blur(12px); z-index: 10; }
  .back { color: var(--muted); text-decoration: none; font-size: 1.4rem; }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .content { padding: 1.5rem; max-width: 420px; margin: 0 auto; position: relative; z-index: 1; }
  .section-label { font-size: 0.7rem; font-weight: 500; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 0.8rem; margin-top: 1.8rem; }
  .avatar-section { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.5rem; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(124,77,255,0.2)); border: 2px solid rgba(0,229,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-hint { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .avatar-hint b { color: var(--accent); font-weight: 500; }
  .field { margin-bottom: 0.8rem; }
  .field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
  .field input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: rgba(0,229,255,0.4); }
  .social-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
  .social-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
  .si-li { background: rgba(10,102,194,0.2); border: 1px solid rgba(10,102,194,0.3); color: #5ba3e0; }
  .si-ig { background: rgba(195,42,163,0.2); border: 1px solid rgba(195,42,163,0.3); color: #e87bd4; }
  .si-tw { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; }
  .si-gh { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #ccc; }
  .modes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.5rem; }
  .mode-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 0.9rem; cursor: pointer; transition: all 0.2s; text-align: center; }
  .mode-card.active { border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.06); }
  .mode-card .mode-emoji { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .mode-card .mode-name { font-size: 0.8rem; font-weight: 500; }
  .mode-card .mode-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }
  .broadcast-btn { width: 100%; background: var(--accent); color: #080c10; border: none; border-radius: 16px; padding: 1.1rem; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 1rem; }
  .broadcast-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }
  .broadcast-btn.active { background: var(--danger); color: white; }
  .status-panel { margin-top: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; display: none; }
  .status-panel.visible { display: block; }
  .status-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00e5a0; animation: blink 2s infinite; flex-shrink: 0; }
  .status-dot.off { background: var(--danger); animation: none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .status-text { font-size: 0.85rem; }
  .gps-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .gps-pill { background: var(--surface2); border-radius: 8px; padding: 3px 10px; font-size: 0.7rem; color: var(--muted); font-family: monospace; }
  .gps-pill.ok { color: #00e5a0; }
  .share-box { margin-top: 1rem; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.2); border-radius: 14px; padding: 1rem; }
  .share-label { font-size: 0.7rem; color: var(--accent); margin-bottom: 0.6rem; letter-spacing: 1px; text-transform: uppercase; }
  .share-btn { width: 100%; background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.3); border-radius: 10px; padding: 0.7rem; color: var(--accent); font-size: 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  #avatar-input { display: none; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="header">
  <a href="index.html" class="back">←</a>
  <span class="header-title">📡 שדר את הבועה שלי</span>
</div>
<div class="content">
  <div class="section-label">פרופיל</div>
  <div class="avatar-section">
    <div class="avatar" onclick="document.getElementById('avatar-input').click()">
      <span id="avatar-emoji">👤</span>
      <img id="avatar-img" style="display:none">
    </div>
    <div class="avatar-hint"><b>הוסף תמונה</b><br>תופיע בבועה שלך כשמישהו סורק אותך</div>
    <input type="file" id="avatar-input" accept="image/*" onchange="handleAvatar(event)">
  </div>
  <div class="field"><label>שם מלא</label><input type="text" id="name" placeholder="ישראל ישראלי"></div>
  <div class="field"><label>תפקיד</label><input type="text" id="role" placeholder="מייסד · Startup"></div>
  <div class="field"><label>חברה / ארגון</label><input type="text" id="company" placeholder="שם החברה"></div>
  <div class="section-label">סושיאל</div>
  <div class="social-row">
    <div class="social-icon si-li">in</div>
    <div class="field" style="flex:1;margin:0"><input type="text" id="linkedin" placeholder="linkedin.com/in/username"></div>
  </div>
  <div class="social-row">
    <div class="social-icon si-ig">ig</div>
    <div class="field" style="flex:1;margin:0"><input type="text" id="instagram" placeholder="@username"></div>
  </div>
  <div class="social-row">
    <div class="social-icon si-tw">𝕏</div>
    <div class="field" style="flex:1;margin:0"><input type="text" id="twitter" placeholder="@username"></div>
  </div>
  <div class="social-row">
    <div class="social-icon si-gh">gh</div>
    <div class="field" style="flex:1;margin:0"><input type="text" id="github" placeholder="github.com/username"></div>
  </div>
  <div class="section-label">מצב שידור</div>
  <div class="modes-grid">
    <div class="mode-card active" onclick="selectMode(this,'networking')"><div class="mode-emoji">💼</div><div class="mode-name">נטוורקינג</div><div class="mode-desc">תפקיד + מקצועי</div></div>
    <div class="mode-card" onclick="selectMode(this,'social')"><div class="mode-emoji">👋</div><div class="mode-name">חברתי</div><div class="mode-desc">שם + סושיאל</div></div>
    <div class="mode-card" onclick="selectMode(this,'dating')"><div class="mode-emoji">💫</div><div class="mode-name">היכרויות</div><div class="mode-desc">שם + תמונה</div></div>
    <div class="mode-card" onclick="selectMode(this,'off')"><div class="mode-emoji">🔒</div><div class="mode-name">פרטי</div><div class="mode-desc">לא נראה</div></div>
  </div>
  <button class="broadcast-btn" id="broadcastBtn" onclick="toggleBroadcast()">📡 פתח את הבועה שלי</button>
  <div class="status-panel" id="statusPanel">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">מתחבר...</div>
    </div>
    <div class="gps-row">
      <span class="gps-pill" id="gpsPill">📍 GPS: ממתין...</span>
    </div>
    <div class="share-box" id="shareBox" style="display:none">
      <div class="share-label">📤 שתף עם חברים לסריקה</div>
      <button class="share-btn" onclick="shareLink()">שתף קישור לסריקה</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, remove, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const app = initializeApp({ databaseURL: "https://bubbles-a04a5-default-rtdb.europe-west1.firebasedatabase.app" });
const db = getDatabase(app);

let broadcasting = false;
let currentMode = 'networking';
let profileId = null;
let dbRef = null;
let keepAlive = null;
let currentLat = null;
let currentLng = null;
let gpsWatcher = null;

window.handleAvatar = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const max = 80, r = Math.min(max/img.width, max/img.height);
      c.width = img.width*r; c.height = img.height*r;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      const small = c.toDataURL('image/jpeg', 0.7);
      document.getElementById('avatar-img').src = small;
      document.getElementById('avatar-img').style.display = 'block';
      document.getElementById('avatar-emoji').style.display = 'none';
      localStorage.setItem('bubble_avatar', small);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

window.selectMode = (el, mode) => {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMode = mode;
};

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById('gpsPill').textContent = '📍 GPS: לא נתמך';
    return;
  }
  gpsWatcher = navigator.geolocation.watchPosition(
    (pos) => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      const pill = document.getElementById('gpsPill');
      pill.textContent = `📍 ${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
      pill.classList.add('ok');
      if (broadcasting && dbRef) {
        set(dbRef, { ...getProfile(), timestamp: Date.now() });
      }
    },
    (err) => {
      document.getElementById('gpsPill').textContent = '📍 GPS: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

const getProfile = () => ({
  id: profileId,
  name: document.getElementById('name').value || 'אנונימי',
  role: document.getElementById('role').value,
  company: document.getElementById('company').value,
  mode: currentMode,
  socials: {
    linkedin: document.getElementById('linkedin').value,
    instagram: document.getElementById('instagram').value,
    twitter: document.getElementById('twitter').value,
    github: document.getElementById('github').value,
  },
  avatar: localStorage.getItem('bubble_avatar') || null,
  lat: currentLat,
  lng: currentLng,
  timestamp: Date.now(),
  active: true
});

window.toggleBroadcast = async () => {
  if (broadcasting) { await stopBroadcast(); return; }
  if (!document.getElementById('name').value.trim()) { alert('נא להזין שם'); return; }
  if (currentMode === 'off') { alert('בחר מצב שידור'); return; }

  document.getElementById('statusPanel').classList.add('visible');
  document.getElementById('statusText').textContent = 'מבקש GPS...';

  startGPS();

  // Wait up to 5s for GPS
  await new Promise(resolve => {
    let tries = 0;
    const check = setInterval(() => {
      tries++;
      if (currentLat || tries > 10) { clearInterval(check); resolve(); }
    }, 500);
  });

  document.getElementById('statusText').textContent = 'מתחבר ל-Firebase...';
  profileId = 'u_' + Date.now().toString(36);
  dbRef = ref(db, 'bubbles/' + profileId);

  try {
    await set(dbRef, getProfile());
    onDisconnect(dbRef).remove();
    broadcasting = true;
    document.getElementById('broadcastBtn').textContent = '⛔ סגור את הבועה שלי';
    document.getElementById('broadcastBtn').classList.add('active');
    document.getElementById('statusText').textContent = currentLat
      ? '✅ הבועה פתוחה · עם GPS'
      : '✅ הבועה פתוחה · ללא GPS';
    document.getElementById('shareBox').style.display = 'block';

    keepAlive = setInterval(() => {
      if (dbRef) set(dbRef, { ...getProfile(), timestamp: Date.now() });
    }, 8000);
  } catch(e) {
    document.getElementById('statusText').textContent = '❌ שגיאה: ' + e.message;
    document.getElementById('statusDot').classList.add('off');
  }
};

async function stopBroadcast() {
  broadcasting = false;
  clearInterval(keepAlive);
  if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
  if (dbRef) try { await remove(dbRef); } catch(e) {}
  document.getElementById('broadcastBtn').textContent = '📡 פתח את הבועה שלי';
  document.getElementById('broadcastBtn').classList.remove('active');
  document.getElementById('statusText').textContent = 'הבועה סגורה';
  document.getElementById('statusDot').classList.add('off');
  document.getElementById('shareBox').style.display = 'none';
}

window.shareLink = () => {
  const url = 'https://uronix-tech.github.io/BUBBLE/scanner.html';
  if (navigator.share) navigator.share({ title: 'BubbleAR — סרוק אותי!', url });
  else navigator.clipboard.writeText(url).then(() => alert('קישור הועתק!'));
};

const saved = localStorage.getItem('bubble_avatar');
if (saved) {
  document.getElementById('avatar-img').src = saved;
  document.getElementById('avatar-img').style.display = 'block';
  document.getElementById('avatar-emoji').style.display = 'none';
}
</script>
</body>
</html>
