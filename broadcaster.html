<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BubbleAR — שדר</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #151b22;
    --border: rgba(255,255,255,0.08);
    --accent: #00e5ff;
    --text: #f0f4f8;
    --muted: rgba(240,244,248,0.5);
    --danger: #ff4d6d;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(8,12,16,0.9);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .back { color: var(--muted); text-decoration: none; font-size: 1.4rem; }
  .header-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .content { padding: 1.5rem; max-width: 420px; margin: 0 auto; position: relative; z-index: 1; }

  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    margin-top: 1.8rem;
  }

  .avatar-section {
    display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.5rem;
  }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(124,77,255,0.2));
    border: 2px solid rgba(0,229,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; cursor: pointer; overflow: hidden;
    position: relative;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-hint { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .avatar-hint b { color: var(--accent); font-weight: 500; }

  .field {
    margin-bottom: 0.8rem;
  }
  .field label {
    display: block; font-size: 0.75rem; color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: rgba(0,229,255,0.4); }

  .social-row {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.6rem;
  }
  .social-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .si-li { background: rgba(10,102,194,0.2); border: 1px solid rgba(10,102,194,0.3); }
  .si-ig { background: rgba(195,42,163,0.2); border: 1px solid rgba(195,42,163,0.3); }
  .si-tw { background: rgba(29,161,242,0.2); border: 1px solid rgba(29,161,242,0.3); }
  .si-gh { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }

  .modes-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.6rem; margin-bottom: 1.5rem;
  }
  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-card.active {
    border-color: rgba(0,229,255,0.5);
    background: rgba(0,229,255,0.06);
  }
  .mode-card .mode-emoji { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .mode-card .mode-name { font-size: 0.8rem; font-weight: 500; }
  .mode-card .mode-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

  .broadcast-btn {
    width: 100%;
    background: var(--accent);
    color: #080c10;
    border: none;
    border-radius: 16px;
    padding: 1.1rem;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 1rem;
    position: relative;
    overflow: hidden;
  }
  .broadcast-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }
  .broadcast-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .broadcast-btn.active {
    background: var(--danger);
    color: white;
  }

  .status-panel {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem;
    display: none;
  }
  .status-panel.visible { display: block; }

  .status-row {
    display: flex; align-items: center; gap: 0.8rem;
    margin-bottom: 0.6rem;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00e5a0;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  .status-dot.off { background: var(--danger); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,229,160,0); }
  }
  .status-text { font-size: 0.85rem; }
  .status-id {
    font-size: 0.7rem; color: var(--muted);
    background: var(--surface2); border-radius: 8px;
    padding: 0.5rem 0.8rem; margin-top: 0.5rem;
    word-break: break-all; font-family: monospace;
  }
  .profile-preview {
    margin-top: 1rem;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 14px;
    padding: 1rem;
  }
  .preview-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .preview-role { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
  .preview-socials { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
  .preview-pill {
    background: rgba(255,255,255,0.08);
    border-radius: 8px; padding: 3px 10px;
    font-size: 0.75rem; color: var(--muted);
  }

  #avatar-input { display: none; }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="header">
  <a href="index.html" class="back">←</a>
  <span class="header-title">📡 שדר את הבועה שלי</span>
</div>

<div class="content">

  <div class="section-label">פרופיל</div>

  <div class="avatar-section">
    <div class="avatar" onclick="document.getElementById('avatar-input').click()">
      <span id="avatar-emoji">👤</span>
      <img id="avatar-img" style="display:none">
    </div>
    <div class="avatar-hint">
      <b>הוסף תמונה</b><br>
      תופיע בבועה שלך כשמישהו סורק אותך
    </div>
    <input type="file" id="avatar-input" accept="image/*" onchange="handleAvatar(event)">
  </div>

  <div class="field">
    <label>שם מלא</label>
    <input type="text" id="name" placeholder="ישראל ישראלי" oninput="updatePreview()">
  </div>
  <div class="field">
    <label>תפקיד</label>
    <input type="text" id="role" placeholder="מייסד · Startup" oninput="updatePreview()">
  </div>
  <div class="field">
    <label>חברה / ארגון</label>
    <input type="text" id="company" placeholder="שם החברה" oninput="updatePreview()">
  </div>

  <div class="section-label">סושיאל</div>

  <div class="social-row">
    <div class="social-icon si-li">in</div>
    <div class="field" style="flex:1; margin:0">
      <input type="text" id="linkedin" placeholder="linkedin.com/in/username" oninput="updatePreview()">
    </div>
  </div>
  <div class="social-row">
    <div class="social-icon si-ig">📷</div>
    <div class="field" style="flex:1; margin:0">
      <input type="text" id="instagram" placeholder="@username" oninput="updatePreview()">
    </div>
  </div>
  <div class="social-row">
    <div class="social-icon si-tw">𝕏</div>
    <div class="field" style="flex:1; margin:0">
      <input type="text" id="twitter" placeholder="@username" oninput="updatePreview()">
    </div>
  </div>
  <div class="social-row">
    <div class="social-icon si-gh">⌥</div>
    <div class="field" style="flex:1; margin:0">
      <input type="text" id="github" placeholder="github.com/username" oninput="updatePreview()">
    </div>
  </div>

  <div class="section-label">מצב שידור</div>

  <div class="modes-grid">
    <div class="mode-card active" onclick="selectMode(this,'networking')">
      <div class="mode-emoji">💼</div>
      <div class="mode-name">נטוורקינג</div>
      <div class="mode-desc">תפקיד + רשתות מקצועיות</div>
    </div>
    <div class="mode-card" onclick="selectMode(this,'social')">
      <div class="mode-emoji">👋</div>
      <div class="mode-name">חברתי</div>
      <div class="mode-desc">שם + סושיאל בלבד</div>
    </div>
    <div class="mode-card" onclick="selectMode(this,'dating')">
      <div class="mode-emoji">💫</div>
      <div class="mode-name">היכרויות</div>
      <div class="mode-desc">שם + תמונה בלבד</div>
    </div>
    <div class="mode-card" onclick="selectMode(this,'off')">
      <div class="mode-emoji">🔒</div>
      <div class="mode-name">פרטי</div>
      <div class="mode-desc">לא נראה לאחרים</div>
    </div>
  </div>

  <button class="broadcast-btn" id="broadcastBtn" onclick="toggleBroadcast()">
    📡 פתח את הבועה שלי
  </button>

  <div class="status-panel" id="statusPanel">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">מחפש מכשירי Bluetooth...</div>
    </div>
    <div class="status-id" id="statusId"></div>
    <div class="profile-preview" id="profilePreview">
      <div class="preview-name" id="previewName">—</div>
      <div class="preview-role" id="previewRole">—</div>
      <div class="preview-socials" id="previewSocials"></div>
    </div>
  </div>

</div>

<script>
let broadcasting = false;
let currentMode = 'networking';
let broadcastInterval = null;
let profileId = null;

function handleAvatar(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById('avatar-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('avatar-emoji').style.display = 'none';
    localStorage.setItem('bubble_avatar', ev.target.result);
  };
  reader.readAsDataURL(file);
}

function selectMode(el, mode) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMode = mode;
}

function updatePreview() {
  const name = document.getElementById('name').value || '—';
  const role = document.getElementById('role').value;
  const company = document.getElementById('company').value;
  const li = document.getElementById('linkedin').value;
  const ig = document.getElementById('instagram').value;
  const tw = document.getElementById('twitter').value;
  const gh = document.getElementById('github').value;

  document.getElementById('previewName').textContent = name;
  document.getElementById('previewRole').textContent = [role, company].filter(Boolean).join(' · ') || '—';

  const socials = document.getElementById('previewSocials');
  socials.innerHTML = '';
  if (li) socials.innerHTML += '<span class="preview-pill">LinkedIn</span>';
  if (ig) socials.innerHTML += '<span class="preview-pill">Instagram</span>';
  if (tw) socials.innerHTML += '<span class="preview-pill">Twitter/X</span>';
  if (gh) socials.innerHTML += '<span class="preview-pill">GitHub</span>';
}

function getProfile() {
  return {
    id: profileId,
    name: document.getElementById('name').value,
    role: document.getElementById('role').value,
    company: document.getElementById('company').value,
    mode: currentMode,
    socials: {
      linkedin: document.getElementById('linkedin').value,
      instagram: document.getElementById('instagram').value,
      twitter: document.getElementById('twitter').value,
      github: document.getElementById('github').value,
    },
    avatar: localStorage.getItem('bubble_avatar') || null,
    timestamp: Date.now()
  };
}

async function toggleBroadcast() {
  if (broadcasting) {
    stopBroadcast();
    return;
  }

  const name = document.getElementById('name').value.trim();
  if (!name) {
    alert('נא להזין שם לפני פתיחת הבועה');
    return;
  }

  if (currentMode === 'off') {
    alert('הבועה במצב פרטי — בחר מצב אחר לשידור');
    return;
  }

  document.getElementById('statusPanel').classList.add('visible');
  document.getElementById('statusText').textContent = 'מאתחל שידור...';
  document.getElementById('statusDot').classList.remove('off');

  profileId = 'bubble_' + Math.random().toString(36).substr(2, 9);

  const profile = getProfile();
  profile.id = profileId;

  // Store in localStorage — scanner will read this
  // In production this would go to a real-time backend (Firebase/Supabase)
  localStorage.setItem('bubble_profile_' + profileId, JSON.stringify(profile));
  localStorage.setItem('bubble_active', profileId);

  // Simulate BLE advertisement by broadcasting profile ID
  // Real implementation: navigator.bluetooth (Web Bluetooth) or BLE beacon
  try {
    await simulateBLEBroadcast(profile);
  } catch(e) {
    console.log('BLE simulation:', e.message);
  }

  broadcasting = true;
  document.getElementById('broadcastBtn').textContent = '⛔ סגור את הבועה שלי';
  document.getElementById('broadcastBtn').classList.add('active');
  document.getElementById('statusText').textContent = 'הבועה פתוחה · משדר לסביבה';
  document.getElementById('statusId').textContent = '🔑 Profile ID: ' + profileId;
  updatePreview();

  // Keep profile fresh every 5 seconds
  broadcastInterval = setInterval(() => {
    const updated = getProfile();
    updated.id = profileId;
    updated.timestamp = Date.now();
    localStorage.setItem('bubble_profile_' + profileId, JSON.stringify(updated));
    localStorage.setItem('bubble_active', profileId);
  }, 5000);
}

async function simulateBLEBroadcast(profile) {
  // Web Bluetooth API - request device to trigger BLE scan permission
  // In a full native app, this would use BLE peripheral mode
  // For POC: we use localStorage + BroadcastChannel as simulation
  const channel = new BroadcastChannel('bubble_ble');
  channel.postMessage({ type: 'BUBBLE_ADVERTISE', profile });

  // Also try Web Bluetooth if available (Chrome Android)
  if (navigator.bluetooth) {
    document.getElementById('statusText').textContent = 'מבקש הרשאת Bluetooth...';
    try {
      // This triggers the BLE permission prompt on Android Chrome
      // In POC mode we just confirm it's available
      document.getElementById('statusText').textContent = '✓ Bluetooth זמין · משדר...';
    } catch(e) {
      document.getElementById('statusText').textContent = '⚠ ללא BLE — משדר דרך רשת';
    }
  }
}

function stopBroadcast() {
  broadcasting = false;
  if (broadcastInterval) clearInterval(broadcastInterval);

  localStorage.removeItem('bubble_active');

  const channel = new BroadcastChannel('bubble_ble');
  channel.postMessage({ type: 'BUBBLE_OFF', id: profileId });

  document.getElementById('broadcastBtn').textContent = '📡 פתח את הבועה שלי';
  document.getElementById('broadcastBtn').classList.remove('active');
  document.getElementById('statusText').textContent = 'הבועה סגורה';
  document.getElementById('statusDot').classList.add('off');
  document.getElementById('statusId').textContent = '';
}

// Restore avatar if saved
window.onload = () => {
  const saved = localStorage.getItem('bubble_avatar');
  if (saved) {
    document.getElementById('avatar-img').src = saved;
    document.getElementById('avatar-img').style.display = 'block';
    document.getElementById('avatar-emoji').style.display = 'none';
  }
};
</script>
</body>
</html>
